{{- if or .Params.math site.Params.math -}}
<script>
  MathJax = {
    tex: {
      inlineMath: [
        ["$", "$"],
        ["\\(", "\\)"],
      ],
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script
  src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/4.0.0/tex-chtml-nofont.min.js"
  integrity="sha512-WfbC3/6OCK0239elhU+dZBsn02JKL1j64JDjX7QZVRbbiU1N0oFx9pGvQwbWeb982x7JktnbPvCq7ZAoQQqGGw=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
  defer
></script>
{{- end -}}
