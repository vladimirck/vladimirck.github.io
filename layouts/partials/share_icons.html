<ul class="share-buttons">
    <li>
        <button class="share-link-btn" onclick="copyToClipboard('{{ .Permalink }}')" title="Copiar enlace del artículo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
            <span class="share-link-text">Compartir este artículo</span>
        </button>
    </li>
</ul>

<script>
function copyToClipboard(text) {
    const originalText = "Compartir este artículo";
    const successText = "¡Enlace copiado!";
    
    navigator.clipboard.writeText(text).then(() => {
        const labels = document.querySelectorAll('.share-link-text');
        labels.forEach(label => label.innerText = successText);
        
        setTimeout(() => {
            labels.forEach(label => label.innerText = originalText);
        }, 2000);
    }).catch(err => {
        console.error('Error al copiar: ', err);
    });
}
</script>

<style>
    .share-link-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 6px 15px;
        cursor: pointer;
        color: var(--secondary);
        font-family: inherit;
        font-size: 14px;
        transition: all 0.2s ease;
        margin: 10px 0;
    }
    
    .share-link-btn:hover {
        background: var(--tertiary);
        color: var(--primary);
        border-color: var(--secondary);
    }

    .share-buttons {
        margin: 0;
        padding: 0;
        list-style: none;
    }

    /* Ajuste para la versión superior para que no pegue con el título */
    .post-header + .share-buttons {
        margin-top: -10px;
        margin-bottom: 20px;
    }
</style>
