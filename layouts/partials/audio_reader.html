<div class="audio-reader no-print" id="audio-reader-container" style="display: none;">
    <div class="main-controls">
        <button id="play-pause-btn" aria-label="Escuchar artículo">
            <svg id="play-icon" class="icon" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg id="pause-icon" class="icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
            <span id="btn-text">Escuchar artículo</span>
        </button>
        
        <button id="stop-btn" title="Detener reproducción" aria-label="Detener">
            <svg viewBox="0 0 24 24">
                <rect x="6" y="6" width="12" height="12" rx="2"></rect>
            </svg>
        </button>
    </div>
    
    <div class="speed-control">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px; height:16px; color:var(--secondary)">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <select id="reader-rate" title="Velocidad de lectura">
            <option value="0.8">0.8x</option>
            <option value="1" selected>1.0x</option>
            <option value="1.2">1.2x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2.0x</option>
        </select>
    </div>
    
    <span class="audio-status" id="audio-status"></span>
</div>

<script>
    (function() {
        if (!('speechSynthesis' in window)) return;

        const container = document.getElementById('audio-reader-container');
        const playBtn = document.getElementById('play-pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const rateSelect = document.getElementById('reader-rate');
        const statusSpan = document.getElementById('audio-status');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const btnText = document.getElementById('btn-text');

        let synth = window.speechSynthesis;
        let voices = [];
        let currentUtterance = null;
        let isPaused = false;
        
        container.style.display = 'flex';

        function loadVoices() {
            voices = synth.getVoices();
        }
        
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = loadVoices;
        }
        loadVoices();

        function getBestVoice() {
            // Prioridad: es-DO, es-ES, es-MX, cualquier es
            const preferred = ['es-DO', 'es-ES', 'es-MX', 'es-AR', 'es'];
            for (let lang of preferred) {
                const voice = voices.find(v => v.lang.startsWith(lang));
                if (voice) return voice;
            }
            return voices.find(v => v.lang.includes('es')) || null;
        }

        function getCleanText() {
            const articleContent = document.querySelector('.post-content');
            if (!articleContent) return "";
            const clone = articleContent.cloneNode(true);
            const exclude = 'pre, code, .no-read, script, style, table, figure, .toc, .audio-reader';
            clone.querySelectorAll(exclude).forEach(el => el.remove());
            return clone.innerText.replace(/\s+/g, ' ').trim();
        }

        function updateUI(state) {
            if (state === 'playing') {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'inline';
                btnText.innerText = 'Pausar';
                statusSpan.innerText = 'Leyendo...';
            } else if (state === 'paused') {
                playIcon.style.display = 'inline';
                pauseIcon.style.display = 'none';
                btnText.innerText = 'Reanudar';
                statusSpan.innerText = 'Pausado';
            } else {
                playIcon.style.display = 'inline';
                pauseIcon.style.display = 'none';
                btnText.innerText = 'Escuchar artículo';
                statusSpan.innerText = '';
            }
        }

        playBtn.addEventListener('click', () => {
            if (synth.speaking && !synth.paused) {
                synth.pause();
                isPaused = true;
                updateUI('paused');
            } else if (synth.paused || (synth.speaking && isPaused)) {
                synth.resume();
                isPaused = false;
                updateUI('playing');
                
                // Fix for Chrome bug where resume() sometimes fails after long pause
                setTimeout(() => {
                   if (synth.paused && isPaused === false) {
                       synth.resume();
                   }
                }, 100);
            } else {
                synth.cancel(); // Reset
                const text = getCleanText();
                if (!text) return;

                currentUtterance = new SpeechSynthesisUtterance(text);
                const voice = getBestVoice();
                if (voice) currentUtterance.voice = voice;
                currentUtterance.lang = 'es';
                currentUtterance.rate = parseFloat(rateSelect.value);

                currentUtterance.onstart = () => updateUI('playing');
                currentUtterance.onend = () => {
                    if (!isPaused) updateUI('idle');
                };
                currentUtterance.onerror = () => updateUI('idle');

                synth.speak(currentUtterance);
                
                // Chrome fix: keep the synth alive for long texts
                const keepAlive = setInterval(() => {
                    if (synth.speaking && !synth.paused) {
                        synth.pause();
                        synth.resume();
                    } else if (!synth.speaking) {
                        clearInterval(keepAlive);
                    }
                }, 14000);
            }
        });

        stopBtn.addEventListener('click', () => {
            synth.cancel();
            isPaused = false;
            updateUI('idle');
        });

        rateSelect.addEventListener('change', () => {
            if (synth.speaking) {
                const wasPlaying = !synth.paused;
                synth.cancel();
                if (wasPlaying) setTimeout(() => playBtn.click(), 100);
            }
        });

        window.addEventListener('beforeunload', () => synth.cancel());
    })();
</script>
