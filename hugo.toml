baseURL = "https://multiverso.do"
languageCode = "es-do"
DefaultContentLanguage = "es"
title = "Multiverso Académico"
theme = "PaperMod"
enableGitInfo = true
relativeURLs = true
canonifyURLs = false

# Versión de Hugo v0.160.1
pygmentsCodeFences = true
pygmentsUseClasses = true
googleAnalytics = "G-1RKT2C1BY5"

[outputs]
    home = ["HTML", "RSS", "JSON"]

[taxonomies]
    category = "categories"
    tag = "tags"
    series = "series"

[Params]
    env = "production" # to enable google analytics, images optimization, etc.
    title = "Multiverso Académico"
    description = "Reflexiones sobre Ciencia, Educación y Gestión Universitaria"
    keywords = ["UASD", "Ciencia", "Educación", "Gestión Universitaria", "Física"]
    author = "Vladimir Pérez"
    # Pilares Temáticos (Centralizado)
    mainCategories = [
        { name = "Gestión y Educación Superior", slug = "gestión-educativa", color = "#3498db", icon = "balance", desc = "Políticas y administración." },
        { name = "Educación Científica", slug = "educación", color = "#9b59b6", icon = "book", desc = "Teoría y didáctica." },
        { name = "Ciencia y Tecnología", slug = "ciencia-y-tecnología", color = "#2ecc71", icon = "atom", desc = "Avances y conceptos." },
        { name = "Breves Propuestas de Políticas Educativas", slug = "policy-briefs", color = "#f1c40f", icon = "document", desc = "Análisis de impacto." }
    ]
    # Estética
    defaultTheme = "auto" # dark, light, auto
    disableThemeToggle = false
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    ShowWordCount = true
    ShowRssButtonInSectionTermList = true
    UseHugoToc = true
    header = { sticky = true }
    disableSpecial1stPost = false
    disableScrollToTop = false
    comments = false
    hidemenu = false
    showtoc = true
    tocopen = true

    [Params.fuseOpts]
        isCaseSensitive = false
        shouldSort = true
        location = 0
        distance = 100
        threshold = 0.4
        minMatchCharLength = 0
        keys = ["title", "permalink", "summary", "content"]

    [Params.assets]
        favicon = "img/logo.png"
        favicon16x16 = "img/logo.png"
        favicon32x32 = "img/logo.png"
        apple_touch_icon = "img/logo.png"
        safari_pinned_tab = "img/logo.png"

    [Params.label]
        text = "Multiverso Académico"
        icon = "img/logo.png"
        iconHeight = 35

    [Params.profileMode]
        enabled = true # needs to be true for the card-like home page
        title = "Multiverso Académico"
        subtitle = "<div class='profile-slogan'>Reflexiones sobre Ciencia, Educación y Gestión Universitaria</div><div class='profile-description'>Explorando ideas innovadoras en investigación científica, políticas educativas y administración académica. Únete a la discusión y comparte tus perspectivas.</div>"
        imageUrl = "img/logo.png"
        imageWidth = 120
        imageHeight = 120
        imageTitle = "Vladimir Pérez"
        [[Params.profileMode.buttons]]
            name = "Explorar Artículos"
            url = "post"
        [[Params.profileMode.buttons]]
            name = "Sobre este blog"
            url = "page/about/"

    [Params.homeInfoParams]
        Title = ""
        Content = ""

    [[Params.socialIcons]]
        name = "twitter"
        url = "https://twitter.com/vladimirck"
    [[Params.socialIcons]]
        name = "github"
        url = "https://github.com/vladimirck"
    [[Params.socialIcons]]
        name = "linkedin"
        url = "https://www.linkedin.com/in/vladimir-p%C3%A9rez-veloz/"

[menu]
    [[menu.main]]
        identifier = "search"
        name = "🔍"
        url = "/search/"
        weight = 1
    [[menu.main]]
        identifier = "themes"
        name = "Temas"
        url = "#"
        weight = 10
    [[menu.main]]
        parent = "themes"
        identifier = "gestión-educativa"
        name = "Gestión y Educación Superior"
        url = "/categories/gestión-educativa/"
        weight = 11
    [[menu.main]]
        parent = "themes"
        identifier = "educación"
        name = "Educación Científica"
        url = "/categories/educación/"
        weight = 12
    [[menu.main]]
        parent = "themes"
        identifier = "ciencia-y-tecnología"
        name = "Ciencia y Tecnología"
        url = "/categories/ciencia-y-tecnología/"
        weight = 13
    [[menu.main]]
        parent = "themes"
        identifier = "policy-briefs"
        name = "Policy"
        url = "/categories/policy-briefs/"
        weight = 14
    [[menu.main]]
        identifier = "archives"
        name = "Archivo"
        url = "/archives/"
        weight = 20
    [[menu.main]]
        identifier = "about"
        name = "Sobre mí"
        url = "/page/about/"
        weight = 30

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true # Permitir HTML en los posts
    [markup.highlight]
        noClasses = false
enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
